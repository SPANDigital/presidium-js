name: OWASP Dependency Check

on:
  schedule:
    - cron: '0 5 * * 0'
  workflow_dispatch:

concurrency:
  group: owasp-depcheck
  cancel-in-progress: false

jobs:
  depcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Cache OWASP Dependency Check data
        uses: actions/cache@v4
        with:
          path: /home/runner/.dependency-check/data
          key: owasp-depcheck-data-${{ runner.os }}-v1
          restore-keys: |
            owasp-depcheck-data-${{ runner.os }}-

      - name: Run Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'presidium-js'
          path: '.'
          format: 'HTML'
          out: 'dependency-reports'
          args: >
            --failOnCVSS 7
            --enableRetired
            --data /home/runner/.dependency-check/data

      - name: Upload Dependency Check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Dependency Check report
          path: ${{github.workspace}}/dependency-reports
